version: '3.9'

# Coding Reviewer - February 2026 Standards
# Features: BuildKit cache, health checks, resource limits, volume mounts, non-root execution

services:
  reviewer:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - "type=registry,ref=localhost:5000/coding-reviewer:buildcache"
      cache_to:
        - "type=registry,ref=localhost:5000/coding-reviewer:buildcache,mode=max"
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: coding-reviewer:latest
    container_name: coding-reviewer
    
    # Non-root execution (hardened by default in Dockerfile)
    user: "1001:1001"
    
    # Volumes for code analysis and reports
    volumes:
      - ./:/workspace:ro  # Read-only access to workspace
      - reviewer-cache:/app/cache
      - reviewer-reports:/app/reports
    
    # Resource limits to prevent resource exhaustion
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '2'
          memory: 512M
    
    # Port mapping
    ports:
      - "8080:8080"
    
    # Environment variables
    environment:
      - LOG_LEVEL=INFO
      - CACHE_DIR=/app/cache
      - REPORTS_DIR=/app/reports
    
    # Health check
    healthcheck:
      test: ["CMD", "test", "-f", "/app/bin/coder"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=coding-reviewer"
    
    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  reviewer-cache:
    driver: local
  reviewer-reports:
    driver: local

networks:
  default:
    name: reviewer-network
    driver: bridge
